    <style>
        :root {
            --primary: #2f3962; 
            --bg-light: #f4f6f9;
            --card-bg: #ffffff;
            --text-dark: #22252a;
            --text-muted: #7d8590;
            --border-color: #f0f2f5;
        }

        body {
            font-family: 'Golos+Text', -apple-system, sans-serif;
            font-weight: 400;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }


        .phone-wrapper {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }


        .profile-header {
            background-color: var(--primary);
            color: #ffffff;
            text-align: center;
            padding: 45px 20px 25px 20px;
            position: relative;
        }

 
        .profile-header h1 {
            font-size: 28px;
            font-weight: 400; 
            margin: 0 0 10px 0;
            letter-spacing: 0.3px;
        }

		.header-logo-container {
    width: 60px;
    height: 60px;
    margin: 0 auto 15px auto;
    display: flex;
    align-items: center;
    justify-content: center;
}

.header-logo-container svg {
    width: 100%;
    height: 100%;
}

        .profile-header .job-title {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            margin: 0 0 30px 0; 
        }


        .quick-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: absolute;
            bottom: -28px; 
            left: 0;
            right: 0;
            z-index: 10;
        }

 
        .action-circle {
            width: 56px;
            height: 56px;
            background-color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: var(--primary);
            font-size: 20px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .action-circle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
        }


        .content-body {
            padding: 50px 20px 100px 20px; 
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Карточка строки */
        .info-row {
            display: flex;
            align-items: flex-start;
            padding: 16px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }


        .icon-box {
            width: 36px;
            height: 36px;
            background-color: #f5f7fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 16px;
            flex-shrink: 0;
        }

        .info-content {
            display: flex;
            flex-direction: column;
        }


        .info-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            margin-bottom: 4px;
        }


        .info-value {
            font-size: 15px;
            color: var(--text-dark);
            font-weight: 400; 
            word-break: break-all;
            text-decoration: none;
        }


        .map-btn {
            display: inline-block;
            background-color: #eaf3fc;
            color: var(--primary);
            font-size: 12px;
            font-weight: 400; 
            padding: 6px 14px;
            border-radius: 20px;
            text-decoration: none;
            margin-top: 10px;
            align-self: flex-start;
            transition: opacity 0.2s;
        }

        .map-btn:hover {
            opacity: 0.85;
        }

        .sticky-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: #ffffff;
            border-top: 1px solid var(--border-color);
        }

        .add-contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 400; 
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-contact-btn:hover {
            background-color: #123863;
        }
    </style>
</head>

    <script>
        function downloadVCard() {
            const vcardData = `BEGIN:VCARD
VERSION:3.0
N:Slava;Korniienko;;;
FN:Slava Korniienko
ORG:Simbad Yachts
TITLE:CTO
TEL;TYPE=CELL,VOICE:+34661625492
EMAIL;TYPE=PREF,INTERNET:slava@simbad-yachts.com
ADR;TYPE=WORK:;;Nueva Dársena Pesquera, 1, 03008 Alicante, Spain
URL:https://simbad-yachts.com
END:VCARD`;

            const blob = new Blob([vcardData], { type: 'text/vcard;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Slava Korniienko.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
